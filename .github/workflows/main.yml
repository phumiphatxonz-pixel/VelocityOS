name: Build VelocityOS ISO
on:
  workflow_dispatch: # ให้เรากดปุ่มสั่งรันเองได้

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build ISO using Docker
        run: |
          docker run --privileged --rm -v $(pwd):/workspace -w /workspace archlinux:latest /bin/bash -c "
            pacman -Syu --noconfirm git arch-install-scripts dosfstools libisoburn squashfs-tools mtools
            chmod +x build.sh
            ./build.sh
          "

      - name: Upload ISO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: VelocityOS-ISO
          path: out/*.iso
