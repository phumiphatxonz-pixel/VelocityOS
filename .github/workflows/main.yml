name: Build VelocityOS ISO
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build ISO using Docker
        run: |
          docker run --privileged --rm -v $(pwd):/workspace -w /workspace archlinux:latest /bin/bash -c "
            # 1. เตรียมระบบและ Keyring (แก้ปัญหา Error: no secret key)
            pacman-key --init
            pacman-key --populate archlinux
            pacman -Syu --noconfirm git arch-install-scripts dosfstools libisoburn squashfs-tools mtools

            # 2. หาตำแหน่งไฟล์ build.sh และรันจากจุดนั้น
            # ปกติ ArcoLinuxB จะอยู่ในหน้าแรก หรือโฟลเดอร์หลัก
            chmod +x *.sh
            ./build.sh
          "

      - name: Upload ISO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: VelocityOS-ISO
          path: out/*.iso
